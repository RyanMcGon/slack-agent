app = 'slack-agent'
primary_region = 'iad'

[build]

# No HTTP service — this is a worker process using Slack Socket Mode.
# No health checks needed; the app maintains a WebSocket to Slack.
[processes]
  app = 'node src/index.js'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  auto_stop_machines = false
  min_machines_running = 1
