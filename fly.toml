app = 'slacktask-agent'
primary_region = 'iad'

[build]

# Socket Mode — persistent WebSocket connection to Slack.
# Machine must stay running at all times.
[[services]]
  internal_port = 3000
  protocol = 'tcp'
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
